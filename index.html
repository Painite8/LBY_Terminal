<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBY Terminal — Indonesia Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D11; --surface: #12171D; --surface-2: #1A2129;
    --border: #232C36; --border-bright: #313D4A;
    --text: #E6EAEF; --text-dim: #8A95A3; --text-faint: #5A6573;
    --gold: #E0A82E; --green: #16C784; --red: #EA3943; --amber: #F0A04B; --blue: #4C8DFF;
    --mono: 'JetBrains Mono', monospace; --display: 'Bricolage Grotesque', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; padding: 0 0 40px; }
  .wrap { max-width: 1440px; margin: 0 auto; padding: 0 16px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 { font-family: var(--display); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; color: var(--text); }
  .brand .accent { color: var(--gold); }
  .brand .tag { font-size: 10px; color: var(--text-faint); letter-spacing: 0.15em; text-transform: uppercase; }
  .clock { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-dim); }
  .pill { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; font-weight: 500; }
  .ticker-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 14px 0; }
  .tk { background: var(--surface); padding: 11px 13px; }
  .tk .lbl { font-size: 9.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .tk .val { font-size: 17px; font-weight: 700; margin: 3px 0 1px; letter-spacing: -0.01em; }
  .tk .chg { font-size: 11px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: 1.15fr 1fr 1fr; gap: 12px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; }
  .card-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); font-weight: 500; }
  .card-title .ic { color: var(--gold); margin-right: 6px; }
  .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .hero .big { font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
  .hero .unit { font-size: 12px; color: var(--text-dim); }
  .meter { height: 7px; background: var(--surface-2); border-radius: 4px; overflow: hidden; margin: 10px 0 6px; }
  .meter-fill { height: 100%; border-radius: 4px; }
  .meter-scale { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-faint); }
  .news-item { padding: 11px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; padding-bottom: 0; }
  .news-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
  .news-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); }
  .news-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .news-src { font-size: 10.5px; color: var(--text-dim); }
  .news-impact { font-size: 11px; color: var(--text-dim); margin-top: 5px; line-height: 1.45; }
  .cred { display: inline-flex; gap: 2px; align-items: center; }
  .cred-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
  .cred-dot.off { background: var(--border-bright); }
  .tag { font-size: 9.5px; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 3px; font-weight: 500; white-space: nowrap; }
  .tag-pos { background: rgba(22,199,132,0.13); color: var(--green); }
  .tag-neg { background: rgba(234,57,57,0.13); color: var(--red); }
  .tag-neu { background: rgba(138,149,163,0.13); color: var(--text-dim); }
  .tag-warn { background: rgba(240,160,75,0.13); color: var(--amber); }
  .tag-info { background: rgba(76,141,255,0.13); color: var(--blue); }
  .sec-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  .sec-row:last-child { margin-bottom: 0; }
  .sec-name { font-size: 11.5px; width: 92px; flex-shrink: 0; color: var(--text); }
  .sec-bar { flex: 1; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; position: relative; }
  .sec-fill { height: 100%; border-radius: 3px; }
  .sec-val { font-size: 11px; font-weight: 500; width: 44px; text-align: right; flex-shrink: 0; }
  .com-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .com-row:last-child { border-bottom: none; padding-bottom: 0; }
  .com-name { font-size: 12.5px; font-weight: 500; }
  .com-sub { font-size: 10px; color: var(--text-faint); }
  .com-price { font-family: var(--mono); font-size: 13px; font-weight: 700; text-align: right; }
  .com-chg { font-size: 11px; font-weight: 500; text-align: right; width: 56px; }
  .reg-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .reg-item:last-child { border-bottom: none; padding-bottom: 0; }
  .reg-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .reg-title { font-size: 12.5px; font-weight: 500; color: var(--text); }
  .reg-sub { font-size: 10.5px; color: var(--text-dim); margin: 2px 0 5px; }
  .cal-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 11px; background: var(--surface-2); border-radius: 7px; margin-bottom: 7px; }
  .cal-item:last-child { margin-bottom: 0; }
  .cal-event { font-size: 12px; font-weight: 500; }
  .cal-detail { font-size: 10px; color: var(--text-dim); }
  .cal-date { font-size: 12px; font-weight: 500; text-align: right; }
  .rate-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .rate-row:last-child { border-bottom: none; padding-bottom: 0; }
  .rate-agency { font-size: 12px; font-weight: 500; }
  .rate-grade { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--gold); }
  .ff-split { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .ff-box { padding: 11px; border-radius: 8px; }
  .ff-box .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .ff-box .num { font-family: var(--mono); font-size: 19px; font-weight: 700; }
  .quote { font-size: 11.5px; line-height: 1.5; color: var(--text-dim); padding-left: 11px; border-left: 2px solid var(--border-bright); margin-bottom: 11px; }
  .quote:last-child { margin-bottom: 0; }
  .quote strong { color: var(--text); font-weight: 500; }
  .footer { margin-top: 24px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 10.5px; color: var(--text-faint); text-align: center; }
  .up { color: var(--green); } .dn { color: var(--red); } .flat { color: var(--text-dim); }
  @media (max-width: 1080px) { .grid { grid-template-columns: 1fr 1fr; } .ticker-strip { grid-template-columns: repeat(4,1fr); } .hero-row { grid-template-columns: 1fr; } }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } .ticker-strip { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><h1>LBY<span class="accent"> Terminal</span></h1><span class="tag">Indonesia Market Intelligence</span></div>
    <div class="clock"><span id="clock">—</span><span class="pill" id="market-status">—</span></div>
  </div>
  <div class="ticker-strip" id="tickers"></div>
  <div class="hero-row" id="heroes"></div>
  <div class="grid">
    <div class="col">
      <div class="card">
        <div class="card-hd"><span class="card-title"><span class="ic">▣</span>News &amp; Sentiment</span><span class="card-title" id="news-count"></span></div>
        <div id="news"></div>
      </div>
    </div>
    <div class="col">
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Commodities</span></div><div id="commodities"></div></div>
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>IDX Sector Heatmap</span></div><div id="sectors"></div></div>
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Historical Precedent</span></div><div id="precedents"></div></div>
    </div>
    <div class="col">
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Regulatory Tracker</span></div><div id="regulations"></div></div>
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Economic Calendar</span></div><div id="calendar"></div></div>
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Sovereign Credit Ratings</span></div><div id="ratings"></div></div>
      <div class="card"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Geopolitical Filter</span></div><div id="geo"></div></div>
    </div>
  </div>
  <div class="footer">LBY Terminal · simulated (mock) data for development · auto-updated daily via GitHub Actions</div>
</div>
<script>
let DATA = {};

const chgClass = c => c > 0 ? 'up' : c < 0 ? 'dn' : 'flat';
const chgStr = (c, note) => { if (c === 0) return note ? '— ' + note : '— 0.00%'; const a = c > 0 ? '▲' : '▼'; return a + ' ' + Math.abs(c).toFixed(2) + '%'; };
const toneColor = t => ({ pos: 'var(--green)', neg: 'var(--red)', warn: 'var(--amber)', neu: 'var(--text-dim)', info: 'var(--blue)' }[t] || 'var(--text-dim)');
const tagClass = t => ({ pos: 'tag-pos', neg: 'tag-neg', warn: 'tag-warn', neu: 'tag-neu', info: 'tag-info' }[t] || 'tag-neu');
const sentLabel = s => ({ pos: '+ Positive', neg: '− Negative', neu: '○ Neutral' }[s] || s);

function render() {
  document.getElementById('clock').textContent = DATA.meta.updated;
  const ms = DATA.meta.marketStatus, msEl = document.getElementById('market-status');
  msEl.textContent = ms.label; msEl.className = 'pill ' + tagClass(ms.tone);
  document.getElementById('tickers').innerHTML = DATA.tickers.map(t => `<div class="tk"><div class="lbl">${t.lbl}</div><div class="val">${t.val}</div><div class="chg ${chgClass(t.chg)}">${chgStr(t.chg, t.note)}</div></div>`).join('');
  document.getElementById('heroes').innerHTML = DATA.heroes.map(h => {
    if (h.type === 'uncertainty') return `<div class="card hero"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Uncertainty Index</span></div><div style="display:flex;align-items:flex-end;gap:8px;"><span class="big" style="color:${h.color}">${h.score}</span><span class="unit" style="padding-bottom:5px;">/100 · ${h.level}</span></div><div class="meter"><div class="meter-fill" style="width:${h.score}%;background:linear-gradient(90deg,var(--green),var(--amber) 55%,var(--red))"></div></div><div class="meter-scale"><span>0 Low</span><span>50 Moderate</span><span>100 High</span></div><div class="news-impact" style="margin-top:9px;border-top:1px solid var(--border);padding-top:9px;">${h.note}</div></div>`;
    if (h.type === 'outlook') return `<div class="card hero"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Market Outlook</span></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span class="tag ${tagClass(h.tone)}" style="font-size:13px;padding:5px 12px;">${h.stance}</span><span class="unit">${h.duration}</span></div><div class="quote" style="border-color:${toneColor(h.tone)};margin:0;">${h.note}</div></div>`;
    if (h.type === 'flow') return `<div class="card hero"><div class="card-hd"><span class="card-title"><span class="ic">▣</span>Foreign Capital Flow</span></div><div class="ff-split"><div class="ff-box" style="background:rgba(234,57,57,0.1)"><div class="lbl" style="color:var(--red)">Net Sell (3d)</div><div class="num" style="color:var(--red)">${h.net3d}</div></div><div class="ff-box" style="background:rgba(240,160,75,0.1)"><div class="lbl" style="color:var(--amber)">Net YTD</div><div class="num" style="color:var(--amber)">${h.ytd}</div></div></div><div class="news-impact" style="margin-top:9px;">Most sold by foreigners: ${h.topSells}</div></div>`;
  }).join('');
  document.getElementById('news-count').textContent = DATA.news.length + ' items';
  document.getElementById('news').innerHTML = DATA.news.map(n => { const dots = Array.from({length:4}, (_,i) => `<span class="cred-dot ${i < n.cred ? '' : 'off'}"></span>`).join(''); return `<div class="news-item"><div class="news-top"><span class="news-title">${n.title}</span><span class="tag ${tagClass(n.sentiment)}">${sentLabel(n.sentiment)}</span></div><div class="news-meta"><span class="news-src">${n.source} · ${n.time}</span><span class="cred" title="Source credibility">${dots}</span><span class="tag tag-info">${n.sector}</span></div><div class="news-impact">${n.impact}</div></div>`; }).join('');
  document.getElementById('commodities').innerHTML = DATA.commodities.map(c => `<div class="com-row"><div><div class="com-name">${c.name}</div><div class="com-sub">${c.sub}</div></div><div class="com-price">${c.price}<span class="com-sub"> ${c.unit}</span></div><div class="com-chg ${chgClass(c.chg)}">${chgStr(c.chg)}</div></div>`).join('');
  const maxAbs = Math.max(...DATA.sectors.map(s => Math.abs(s.chg)));
  document.getElementById('sectors').innerHTML = DATA.sectors.map(s => { const w = Math.round((Math.abs(s.chg)/maxAbs)*100); const col = s.chg>=0?'var(--green)':'var(--red)'; return `<div class="sec-row"><span class="sec-name">${s.name}</span><span class="sec-bar"><span class="sec-fill" style="width:${w}%;background:${col}"></span></span><span class="sec-val ${chgClass(s.chg)}">${s.chg>0?'+':''}${s.chg.toFixed(1)}%</span></div>`; }).join('');
  document.getElementById('regulations').innerHTML = DATA.regulations.map(r => `<div class="reg-item"><span class="reg-dot" style="background:${r.dot}"></span><div><div class="reg-title">${r.title}</div><div class="reg-sub">${r.sub}</div><span class="tag ${tagClass(r.tone)}">${r.status}</span> <span class="tag tag-info">${r.sector}</span></div></div>`).join('');
  document.getElementById('calendar').innerHTML = DATA.calendar.map(c => `<div class="cal-item"><div><div class="cal-event">${c.event}</div><div class="cal-detail">${c.detail}</div></div><div><div class="cal-date">${c.date}</div><span class="tag ${tagClass(c.done?'neu':c.tone)}" style="float:right">${c.done?'Done':c.days+'d'}</span></div></div>`).join('');
  document.getElementById('ratings').innerHTML = DATA.ratings.map(r => `<div class="rate-row"><div><span class="rate-agency">${r.agency}</span> <span class="cal-detail">${r.action}</span></div><div style="text-align:right"><span class="rate-grade">${r.grade}</span> <span class="tag ${tagClass(r.tone)}">${r.outlook}</span></div></div>`).join('');
  document.getElementById('precedents').innerHTML = DATA.precedents.map(p => `<div class="quote">${p.html}</div>`).join('');
  document.getElementById('geo').innerHTML = DATA.geo.map(g => `<div class="quote">${g.html}</div>`).join('');
}
async function load() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    render();
  } catch (e) {
    document.querySelector('.wrap').insertAdjacentHTML('beforeend',
      '<div class="footer" style="color:var(--red)">Could not load data.json — ' + e.message +
      '. If you just deployed, wait a minute and refresh.</div>');
  }
}
load();
</script>
</body>
</html>
