name: Update dashboard data

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 06:00 WIB, daily (before IDX opens)
  workflow_dispatch: {}     # adds a "Run workflow" button for manual runs

permissions:
  contents: write           # allows the job to commit data.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python update.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update market data $(date -u +%Y-%m-%d)"
          git push
